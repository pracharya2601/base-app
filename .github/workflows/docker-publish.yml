name: Build and publish image to ghcr.io

# Builds the custom PocketBase image and pushes it to GitHub Container Registry.
# Render is configured (render.yaml) to deploy ghcr.io/<owner>/<repo>:latest, so
# pushing to main -> new image -> Render redeploys.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  # Image repo = ghcr.io/<owner>/<repo-name>, lowercased by the metadata action.
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # required to push to ghcr.io with GITHUB_TOKEN
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # Render runs linux/amd64. Add linux/arm64 here if you also want
          # to pull the image on Apple Silicon for local testing.
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
